<!DOCTYPE html>
<!-- ============================================
     FILE: admin-login.html
     PURPOSE: Admin Login Page
     FEATURES:
     - Firebase auth for admin accounts
     - Checks admin role in Firestore
     - Only authorized personnel can access
     ============================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="IIUI Gym Admin Login. Authorized personnel only."/>
  <title>Admin Login — IIUI Gym</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon">🏋️</span>
      <span>IIUI <span class="brand-accent">GYM</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Join Now</a></li>
      <li><a href="login.html">Member Login</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="admin-login.html" class="active">Admin</a></li>
    </ul>
    <div class="hamburger" onclick="toggleMenu()" aria-label="Toggle navigation menu">&#9776;</div>
  </nav>

  <!-- ADMIN LOGIN FORM -->
  <section class="form-section">
    <div class="form-card login-card">
      <span class="form-icon">🔐</span>
      <h2>Admin <span class="highlight">Login</span></h2>
      <p class="form-subtitle">Authorized personnel only</p>

      <form id="adminLoginForm" novalidate>

        <div class="form-group">
          <label for="admin_email">Admin Email</label>
          <input type="email" name="email" id="admin_email"
                 placeholder="admin@gmail.com" required/>
        </div>

        <div class="form-group">
          <label for="admin_password">Password</label>
          <input type="password" name="password" id="admin_password"
                 placeholder="••••••••" required/>
          <span class="error-msg" id="adminLoginErr"></span>
        </div>

        <button type="submit" class="btn-primary full-width" id="adminLoginBtn">
          🔓 Login as Admin
        </button>

      </form>

      <p class="form-footer" style="margin-top:1.5rem;">
        <a href="login.html">← Member Login instead</a>
      </p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-bottom">
        © 2026 IIUI Gym — Sector H-10, Islamabad, Pakistan
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- FIX: EmailJS script added for consistency — firebase-config.js references emailjs -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
