<!DOCTYPE html>
<!-- ============================================
     FILE: contact.html
     PURPOSE: Contact Us Page
     FEATURES:
     - Contact form saves to Firestore
     - EmailJS sends confirmation email
     - Gym location and timing info
     ============================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Contact IIUI Gym — Send us a message, find our location, and check gym timings."/>
  <title>Contact — IIUI Gym</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon">🏋️</span>
      <span>IIUI <span class="brand-accent">GYM</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Join Now</a></li>
      <li><a href="login.html">Member Login</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="admin-login.html">Admin</a></li>
    </ul>
    <div class="hamburger" onclick="toggleMenu()" aria-label="Toggle navigation menu">&#9776;</div>
  </nav>

  <!-- CONTACT FORM -->
  <section class="form-section">
    <div class="form-card">
      <h2>Get In <span class="highlight">Touch</span></h2>
      <p class="form-subtitle">We'll get back to you within 24 hours</p>

      <form id="contactForm" novalidate>

        <div class="form-group">
          <label for="cname">Your Name</label>
          <input type="text" name="name" id="cname"
                 placeholder="Full Name" required/>
          <span class="error-msg" id="cnameErr"></span>
        </div>

        <div class="form-group">
          <label for="cemail">Email Address</label>
          <input type="email" name="email" id="cemail"
                 placeholder="you@example.com" required/>
          <span class="error-msg" id="cemailErr"></span>
        </div>

        <div class="form-group">
          <label for="cmessage">Message</label>
          <textarea name="message" id="cmessage" rows="5"
                    placeholder="Write your message here..." required></textarea>
          <span class="error-msg" id="cmsgErr"></span>
        </div>

        <button type="submit" class="btn-primary full-width" id="contactBtn">
          📨 Send Message
        </button>

      </form>

      <!-- Gym Info -->
      <div class="contact-info-card" style="max-width:100%; margin-top:2rem;">
        <div class="info-item">
          <span class="info-icon">📍</span> IIUI Campus, Sector H-10, Islamabad
        </div>
        <div class="info-item">
          <span class="info-icon">📞</span> 051-9019752
        </div>
        <div class="info-item">
          <span class="info-icon">🕐</span> Mon–Fri: 9AM – 7PM
        </div>
        <div class="info-item">
          <span class="info-icon">📧</span> gym@iiu.edu.pk
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-bottom">
        © 2026 IIUI Gym — Sector H-10, Islamabad, Pakistan
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
